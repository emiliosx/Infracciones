ion":"Seguridad vial","tipo":"Muy grave","hecho":"Realizar en la vía obras sin la autorización correspondiente, así como la retirada, ocultación, alteración o deterioro de la señalización permanente u ocasional","multa":3000,"multa_reducida":1500,"puntos":0,"articulo":"LSV art. 65.6 / OMC art. 65.6 a)"},{"seccion":"Seguridad vial","tipo":"Leve","hecho":"Depositar o abandonar sobre la vía objetos o materias que puedan entorpecer la libre circulación, parada o estacionamiento","multa":70,"multa_reducida":35,"puntos":0,"articulo":"RGC art. 4.2 / LSV art. 10.2 / OMC art. 65.3"},{"seccion":"Seguridad vial","tipo":"Muy grave","hecho":"No instalar la señalización de obras o hacerlo incorrectamente, poniendo en grave riesgo la seguridad vial","multa":3000,"multa_reducida":1500,"puntos":0,"articulo":"LSV art. 65.6 / OMC art. 65.6 b)"},{"seccion":"Seguridad vial","tipo":"Leve","hecho":"No hacer desaparecer lo antes posible un obstáculo o peligro en la vía por quien lo ha creado","multa":50,"multa_reducida":25,"puntos":0,"articulo":"RGC art. 5.1 / LSV art. 10.3 / OMC art. 65.3"},{"seccion":"Seguridad vial","tipo":"Leve","hecho":"No señalizar de forma eficaz (tanto de día como de noche) un obstáculo o peligro en la vía por quien lo ha creado","multa":50,"multa_reducida":25,"puntos":0,"articulo":"RGC art. 5.3 / LSV art. 10.3 / OMC art. 65.3"},{"seccion":"Incendios y accidentes","tipo":"Grave","hecho":"Arrojar a la vía o en sus inmediaciones cualquier objeto que pueda dar lugar a la producción de incendios","multa":200,"multa_reducida":100,"puntos":4,"articulo":"RGC art. 6.1 / LSV art. 10.4 / OMC art. 65.4 n)"},{"seccion":"Incendios y accidentes","tipo":"Grave","hecho":"Arrojar a la vía o en sus inmediaciones cualquier objeto que pueda producir accidentes de circulación","multa":200,"multa_reducida":100,"puntos":4,"articulo":"RGC art. 6.1 / LSV art. 10.4 / OMC art. 65.4 n)"},{"seccion":"Contaminación y ruido","tipo":"Grave","hecho":"Circular con escape libre o sin dispositivo sil let filtro='';
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function hl(t,q){if(!q)return t;const r=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return t.replace(r,'<mark>$1</mark>')}
function tk(t){return t==='Leve'?'leve':t==='Grave'?'grave':'muyg'}
function setF(t){
  filtro=t;
  document.querySelectorAll('.pill').forEach(p=>p.className='pill');
  if(!t)document.getElementById('p-all').className='pill a-all';
  if(t==='Leve')document.getElementById('p-leve').className='pill a-leve';
  if(t==='Grave')document.getElementById('p-grave').className='pill a-grave';
  if(t==='Muy grave')document.getElementById('p-muyg').className='pill a-muyg';
  render();
}
function copyArt(txt,btn){
  navigator.clipboard.writeText(txt).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='copiar',1400);});
}
function render(){
  const qRaw=document.getElementById('q').value.trim();
  const q=norm(qRaw);
  const res=document.getElementById('results');
  const stats=document.getElementById('stats');
  const f=DATA.filter(d=>{
    const mq=!q||norm(d.hecho).includes(q)||norm(d.seccion).includes(q)||norm(d.articulo).includes(q);
    return mq&&(!filtro||d.tipo===filtro);
  });
  stats.textContent=f.length?f.length+' resultado'+(f.length!==1?'s':''):'';
  if(!f.length){res.innerHTML='<div class="empty">Sin resultados para "'+qRaw+'"</div>';return;}
  res.innerHTML=f.map(d=>{
    const k=tk(d.tipo);
    const pts=d.puntos>0?`<span class="badge-pts">🎫 ${d.puntos} pts</span>`:'';
    const multa=d.multa>0?`<span class="multa-main">${d.multa} €</span><span class="multa-red"> · reducida ${d.multa_reducida} €</span>`:'<span class="multa-red">Importe variable</span>';
    const art=d.articulo.replace(/'/g,"\\'");
    return`<div class="card ${k}">
<div class="card-top"><span class="hecho">${hl(d.hecho,qRaw)}</span><div class="badges"><span class="badge-tipo ${k}">${d.tipo}</span>${pts}</div></div>
<div class="art-row"><span class="art-tag">${hl(d.articulo,qRaw)}</span><button class="copy-btn" onclick="copyArt('${art}',this)">copiar</button></div>
<div class="card-foot">${multa}<span class="seccion-tag">${d.seccion}</span></div>
</div>`;
  }).join('');
}
render();
document.getElementById('q').focus();
</script>
